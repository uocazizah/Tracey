name: Apple Clang macOS Intel

on:
  pull_request:

jobs:
  build:
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v7

      - name: Install tools
        run: |
          brew update
          brew install autoconf automake libtool pkg-config

      - name: Show environment
        run: |
          uname -a
          uname -m
          clang --version

      - name: Build and test
        run: |
          cd bootstrap
          autoreconf -fiv
          mkdir -p build
          cd build

          CC=clang \
          CXX=clang++ \
          ../configure

          make V=1
