name: GCC AArch64 Linux GNU

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            automake \
            autoconf \
            libtool \
            pkg-config

      - name: Build
        run: |
          cd bootstrap

          autoreconf -fiv

          mkdir -p build
          cd build

          ../configure

          make V=1 -j 8
