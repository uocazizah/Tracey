name: GCC X86_64 Linux GNU

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc g++ automake autoconf libtool pkg-config

      - name: Build
        run: |
          cd bootstrap
          autoreconf -fiv
          mkdir -p build && cd build
          ../configure
          make V=1 -j 8
