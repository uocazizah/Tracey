name: Clang x86_32 Testing

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm gcc-multilib g++-multilib automake autoconf libtool pkg-config

      - name: Build
        run: |
          cd bootstrap
          autoreconf -fiv
          mkdir -p build && cd build
          CC=clang CXX=clang++ CFLAGS="-m32" CXXFLAGS="-m32" LDFLAGS="-m32" ../configure
          make V=1 -j 8
